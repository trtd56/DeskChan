<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tron Light Cycle</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%23071013'/%3E%3Cpath d='M10 42h24V18h20' fill='none' stroke='%2322d3ee' stroke-width='8' stroke-linecap='round' stroke-linejoin='round'/%3E%3Cpath d='M54 22H30v24H10' fill='none' stroke='%23ff4f79' stroke-width='8' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="game-stage" aria-label="Tron game">
        <div class="stage-header">
          <div>
            <h1>Tron Light Cycle</h1>
            <p id="statusText">Ready</p>
          </div>
          <div class="scoreboard" aria-label="Score">
            <div>
              <span>You</span>
              <strong id="playerScore">0</strong>
            </div>
            <div>
              <span>CPU</span>
              <strong id="cpuScore">0</strong>
            </div>
          </div>
        </div>

        <div class="arena-wrap">
          <canvas id="gameCanvas" width="960" height="640" aria-label="Tron arena"></canvas>
          <div id="messageLayer" class="message-layer">
            <strong>Press Start</strong>
            <span>Arrow keys or WASD to steer</span>
          </div>
        </div>
      </section>

      <aside class="control-panel" aria-label="Game controls">
        <section class="controls-block">
          <h2>Match</h2>
          <div class="control-grid">
            <label>
              <span>Speed</span>
              <select id="speedSelect">
                <option value="120">Cruise</option>
                <option value="92" selected>Arcade</option>
                <option value="68">Turbo</option>
              </select>
            </label>
            <label>
              <span>CPU</span>
              <select id="difficultySelect">
                <option value="0.55">Easy</option>
                <option value="0.78" selected>Normal</option>
                <option value="0.94">Hard</option>
              </select>
            </label>
          </div>
          <div class="button-row">
            <button id="startButton" class="primary" type="button">Start</button>
            <button id="pauseButton" type="button">Pause</button>
            <button id="resetButton" type="button">Reset</button>
          </div>
        </section>

        <section class="controls-block">
          <h2>Steer</h2>
          <div class="dpad" aria-label="Touch steering controls">
            <button id="upButton" type="button" aria-label="Up">↑</button>
            <button id="leftButton" type="button" aria-label="Left">←</button>
            <button id="downButton" type="button" aria-label="Down">↓</button>
            <button id="rightButton" type="button" aria-label="Right">→</button>
          </div>
        </section>

        <section class="controls-block stats">
          <h2>Telemetry</h2>
          <dl>
            <div>
              <dt>Round</dt>
              <dd id="roundCount">1</dd>
            </div>
            <div>
              <dt>Trail</dt>
              <dd id="trailCount">0</dd>
            </div>
            <div>
              <dt>Last result</dt>
              <dd id="lastResult">-</dd>
            </div>
          </dl>
        </section>
      </aside>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
